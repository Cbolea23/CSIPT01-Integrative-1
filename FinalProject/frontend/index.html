<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Banking Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">
                <i class="bi bi-bank2 me-2"></i>SecureBank
            </a>
            <button class="btn btn-light btn-sm fw-semibold text-primary px-4 rounded-pill" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container main-container mb-5">
        
        <ul class="nav nav-pills justify-content-center mb-4" id="bankingTabs">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="pill" href="#dashboard"><i class="bi bi-wallet2 me-2"></i>Dashboard</a>
            </li>
            <li class="nav-item mx-2">
                <a class="nav-link" data-bs-toggle="pill" href="#transfer"><i class="bi bi-send me-2"></i>Transfer</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="pill" href="#profile" onclick="loadProfile()"><i class="bi bi-person-lines-fill me-2"></i>Profile & History</a>
            </li>
        </ul>

        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="dashboard">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card custom-card mb-4 text-center p-4">
                            <div class="card-body">
                                <p class="text-muted mb-1">Account Number</p>
                                <h5 id="acc-num" class="fw-bold text-dark mb-4">Loading...</h5>
                                <p class="text-muted mb-1">Available Balance</p>
                                <h1 class="text-success fw-bold display-5">PHP <span id="balance">0.00</span></h1>
                            </div>
                        </div>

                        <div class="card custom-card p-3">
                            <div class="card-body">
                                <h6 class="mb-3 text-muted">Quick Transaction</h6>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-white">PHP</span>
                                    <input type="number" id="amount" class="form-control" placeholder="0.00">
                                    <button class="btn btn-success px-4" onclick="makeTransaction('deposit')">Deposit</button>
                                    <button class="btn btn-danger px-4" onclick="makeTransaction('withdraw')">Withdraw</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="transfer">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card custom-card p-4">
                            <div class="card-body text-center">
                                <div class="transfer-icon mb-3"><i class="bi bi-arrow-left-right text-primary fs-1"></i></div>
                                <h4 class="mb-4">Transfer Funds</h4>
                                <div class="text-start">
                                    <label class="form-label text-muted">Destination Account</label>
                                    <input type="text" id="dest-acc" class="form-control form-control-lg mb-3" placeholder="Enter account number">
                                    
                                    <label class="form-label text-muted">Amount</label>
                                    <div class="input-group input-group-lg mb-4">
                                        <span class="input-group-text bg-white">PHP</span>
                                        <input type="number" id="transfer-amount" class="form-control" placeholder="0.00">
                                    </div>
                                    <button class="btn btn-primary btn-lg w-100 rounded-pill" onclick="makeTransfer()">Send Funds</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="profile">
                <div class="row justify-content-center gap-4">
                    
                    <div class="col-lg-4">
                        <div class="card custom-card h-100">
                            <div class="card-body p-4">
                                <h5 class="mb-4"><i class="bi bi-person-gear me-2"></i>Account Details</h5>
                                <label class="text-muted small">Username</label>
                                <input type="text" id="prof-username" class="form-control bg-light mb-3" disabled>
                                
                                <label class="text-muted small">Email Address</label>
                                <input type="email" id="prof-email" class="form-control mb-3">
                                
                                <div class="row">
                                    <div class="col-6">
                                        <label class="text-muted small">First Name</label>
                                        <input type="text" id="prof-first" class="form-control mb-3">
                                    </div>
                                    <div class="col-6">
                                        <label class="text-muted small">Last Name</label>
                                        <input type="text" id="prof-last" class="form-control mb-4">
                                    </div>
                                </div>
                                <button class="btn btn-warning w-100 mb-4 rounded-pill fw-semibold" onclick="updateProfile()">Save Changes</button>
                                
                                <hr>
                                <button class="btn btn-outline-danger w-100 rounded-pill mt-2" onclick="deleteAccount()"><i class="bi bi-exclamation-triangle me-2"></i>Close Account</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-7">
                        <div class="card custom-card h-100">
                            <div class="card-body p-4">
                                <h5 class="mb-4"><i class="bi bi-clock-history me-2"></i>Transaction History</h5>
                                <div class="table-responsive custom-scrollbar" style="max-height: 400px; overflow-y: auto;">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light sticky-top">
                                            <tr>
                                                <th>Date</th>
                                                <th>Type</th>
                                                <th>Amount</th>
                                                <th>Description</th>
                                            </tr>
                                        </thead>
                                        <tbody id="history-table">
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
