<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Banking Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Online Banking System</h2>
            <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
        </div>

        <ul class="nav nav-tabs mb-4" id="bankingTabs">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#transfer">Transfer Funds</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#profile" onclick="loadProfile()">Profile & History</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="dashboard">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Account Details</h5>
                        <p>Account Number: <strong id="acc-num" class="text-primary">Loading...</strong></p>
                        <h2 class="text-success">Balance: PHP <span id="balance">0.00</span></h2>
                    </div>
                </div>
                <div class="input-group mb-3 w-50">
                    <input type="number" id="amount" class="form-control" placeholder="Enter Amount">
                    <button class="btn btn-success" onclick="makeTransaction('deposit')">Deposit</button>
                    <button class="btn btn-danger" onclick="makeTransaction('withdraw')">Withdraw</button>
                </div>
            </div>

            <div class="tab-pane fade" id="transfer">
                <div class="card shadow-sm w-50">
                    <div class="card-body">
                        <h5>Transfer to another account</h5>
                        <input type="text" id="dest-acc" class="form-control mb-3" placeholder="Destination Account Number">
                        <input type="number" id="transfer-amount" class="form-control mb-3" placeholder="Amount to Transfer">
                        <button class="btn btn-primary w-100" onclick="makeTransfer()">Send Funds</button>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="profile">
                <div class="row">
                    <div class="col-md-5">
                        <div class="card shadow-sm mb-3">
                            <div class="card-body">
                                <h5>Edit Profile</h5>
                                <label>Username (Read-Only)</label>
                                <input type="text" id="prof-username" class="form-control mb-2" disabled>
                                <input type="email" id="prof-email" class="form-control mb-2" placeholder="Email Address">
                                <input type="text" id="prof-first" class="form-control mb-2" placeholder="First Name">
                                <input type="text" id="prof-last" class="form-control mb-3" placeholder="Last Name">
                                <button class="btn btn-warning w-100 mb-3" onclick="updateProfile()">Update Profile</button>
                                
                                <hr>
                                <p class="text-muted small">Danger Zone</p>
                                <button class="btn btn-outline-danger w-100" onclick="deleteAccount()">Close Account</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5>Transaction History</h5>
                                <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                                    <table class="table table-sm">
                                        <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th></tr></thead>
                                        <tbody id="history-table">
                                            </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
