<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Banking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Online Banking System</h2>
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">Account Details</h5>
                <p class="card-text">Account Number: <strong id="acc-num">Loading...</strong></p>
                <h3 class="text-success">Balance: PHP <span id="balance">0.00</span></h3>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="input-group mb-3">
                    <input type="number" id="amount" class="form-control" placeholder="Enter Amount">
                    <button class="btn btn-success" onclick="makeTransaction('deposit')">Deposit</button>
                    <button class="btn btn-danger" onclick="makeTransaction('withdraw')">Withdraw</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
