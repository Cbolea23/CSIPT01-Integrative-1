<!DOCTYPE html>
<html>
<head>
    <title>Professors List</title>
    <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>
    <style>
        body {
            background: linear-gradient(to right, #000000, #00213f, #000000);
            color: white;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: rgba(0, 33, 63, 0.5);
            border: 1.3px solid #008cff;
            border-radius: 13px;
            padding: 39px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 5.2px 13px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #008cff;
            text-align: center;
            margin-top: 0;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 140, 255, 0.3);
            font-size: 20.8px;
        }
        a {
            color: #008cff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>List of Professors</h1>
        <ul>
            {% for prof in professors %}
                <li>
                    <a href="{% url 'details' prof.ProfessorID %}">{{ prof.Name }}</a> - {{ prof.Department }}
                </li>
            {% empty %}
                <li>No professors found.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
