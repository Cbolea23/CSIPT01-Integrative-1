<!DOCTYPE html>
<html>
<head>
    <title>Add Record</title>
    <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(to right, #000000, #00213f, #000000);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .navbar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
            position: absolute;
            top: 0;
            right: 0;
            box-sizing: border-box;
        }
        .nav-btn {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
            background: rgba(0, 140, 255, 0.2);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #008cff;
            transition: 0.3s ease;
        }
        .nav-btn:hover {
            background: #008cff;
            transform: translateY(-2px);
        }
        .container {
            background-color: rgba(0, 33, 63, 0.5); 
            backdrop-filter: blur(6.5px);           
            border: 1.3px solid #008cff;            
            width: 90%;
            max-width: 500px; 
            padding: 40px;
            border-radius: 13px;
            box-shadow: 0 5.2px 13px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-top: 80px; 
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; font-weight: bold; color: #008cff; }
        form { text-align: left; }
        p { margin-bottom: 15px; }
        label { font-weight: bold; color: white; display: block; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background-color: rgba(0, 33, 63, 0.8);
            border: 1px solid #008cff;
            border-radius: 5px;
            color: white;
            font-family: 'Lato', sans-serif;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; box-shadow: 0 0 10px rgba(0, 140, 255, 0.6); }
        button {
            padding: 12px 30px;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 65px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary {
            background-color: #008cff;
            color: white;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 140, 255, 0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); background-color: #007bbd; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/" class="nav-btn"><i class="fas fa-home"></i> Home</a>
        <a href="/admin/logout/" class="nav-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="container">
        <h1>Add Order</h1> 
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Save Record</button>
        </form>
    </div>
</body>
</html>
